name: CI

env:
  MIRROR_SSH_URL: 'git@github.com:EpitechPGE1-2025/G-CPE-200-NAN-2-1-corewar-1.git'
  EXECUTABLES: "corewar"

on:
  push:
    branches-ignore: 
      - 'no-ga/*'
  pull_request:
    branches-ignore: 
      - 'no-ga/*'

  workflow_dispatch:

jobs:

  check_repo_url:
    runs-on: ubuntu-latest
    steps:
      - run: exit 1
        if: env.MIRROR_SSH_URL == github.event.repository.ssh_url

  check_compilation_and_coding_style:
    needs: check_repo_url
    runs-on: ubuntu-latest
    container: epitechcontent/epitest-docker
    env:
      CC: epiclang
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Check repo with banana
        run: banana-check-repo 2>&1 | tee banana.log || true

      - name: Display banana check errors if any
        run: |
          grep -E '\[Banana\]' banana.log | while read -r line; do
            file=$(echo "$line" | cut -d: -f1)
            linenbr=$(echo "$line" | cut -d: -f2)
            msg=$(echo "$line" | cut -d: -f5-)
            echo "::warning file=$file,line=$linenbr::$msg"
          done

      - name: Compile the project
        run: make 2>&1 | tee coding_style.log || true
        timeout-minutes: 2

      - name: Display coding style warnings if any
        run: |
          grep '\[Banana\]' coding_style.log | while read -r line; do
            file=$(echo "$line" | cut -d: -f1)
            linenbr=$(echo "$line" | cut -d: -f2)
            type=$(echo "$line" | cut -d: -f4 | tr -d ' ')
            msg=$(echo "$line" | cut -d: -f5-)
            echo "::warning file=$file,line=$linenbr::$msg"
          done

      - name: Fail if banana or compilation had errors or warnings
        run: |
          if grep -q 'warning' banana.log coding_style.log; then
            exit 1
          fi

      - name: Clean the repo
        run: make clean

      - name: Check file existence
        run: |
          EXECUTABLES=$(echo "$EXECUTABLES" | tr ',' ' ')
          HAS_ERROR=0
          for file in $EXECUTABLES; do
            if ! test -f "$file"; then
              echo "::error::$file not found"
              HAS_ERROR=1
              continue
            fi
            if ! test -x "$file"; then
              echo "::error::$file is not executable"
              HAS_ERROR=1
            fi
          done
          if [ "$HAS_ERROR" != 0 ]; then
            exit 1
          fi

  run_tests:
    runs-on: ubuntu-latest  
    container: epitechcontent/epitest-docker
    needs: check_compilation_and_coding_style
    steps:
      - uses: actions/checkout@v6

      - name: Compile tests
        run: make tests_run
        timeout-minutes: 2


  push_to_mirror:
    runs-on: ubuntu-latest
    needs: run_tests
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url:
            ${{ env.MIRROR_SSH_URL }}
          ssh_private_key:
            ${{ secrets.GIT_SSH_PRIVATE_KEY }}
